<!DOCTYPE html>
<html>

<head>
    <title>Test TQMesh Hole</title>
</head>

<body>
    <h3>TQMesh Hole Test</h3>
    <pre id="log"
        style="font-family:monospace;font-size:13px;line-height:1.6;background:#f4f4f4;padding:12px;border-radius:6px;"></pre>
    <div id="result" style="font-size:16px;font-weight:bold;margin-top:12px;"></div>
    <canvas id="c" width="400" height="400" style="border:1px solid #ccc; background: white;"></canvas>

    <script src="js/tqmesh.js"></script>
    <script src="js/tqmesh-wrapper.js"></script>
    <script>
        function log(msg) {
            document.getElementById('log').textContent += msg + '\n';
            console.log(msg);
        }

        async function test() {
            const resultDiv = document.getElementById('result');
            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d');

            try {
                log('=== TQMesh Hole Test ===');

                const outer = [
                    { x: 10, y: 10 },
                    { x: 390, y: 10 },
                    { x: 390, y: 390 },
                    { x: 10, y: 390 }
                ];

                const hole = [
                    { x: 100, y: 100 },
                    { x: 300, y: 100 },
                    { x: 300, y: 300 },
                    { x: 100, y: 300 }
                ];

                log('1) Generating mesh with hole...');
                const t0 = performance.now();
                const res = await FepsTQMesh.generateMesh(outer, 'QUAD4', 40, 3, [hole]);
                const dt = (performance.now() - t0).toFixed(1);

                log('   Success! Time: ' + dt + ' ms');
                log('   Nodes: ' + res.nodes.length);
                log('   Elements: ' + res.elements.length);

                // Visualization
                ctx.clearRect(0, 0, 400, 400);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;

                // Draw elements
                for (const elem of res.elements) {
                    ctx.beginPath();
                    const n0 = res.nodes[elem[0]];
                    ctx.moveTo(n0.x, n0.y);
                    for (let i = 1; i < elem.length; i++) {
                        const ni = res.nodes[elem[i]];
                        ctx.lineTo(ni.x, ni.y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(0, 100, 255, 0.1)';
                    ctx.fill();
                }

                // Draw nodes
                ctx.fillStyle = 'red';
                for (const n of res.nodes) {
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                resultDiv.style.color = 'green';
                resultDiv.textContent = '✓ Meshing with hole succeeded!';

            } catch (e) {
                console.error(e);
                log('\n✗ ERROR: ' + e.message);
                resultDiv.style.color = 'red';
                resultDiv.textContent = '✗ Error: ' + e.message;
            }
        }

        // Wait for TQMeshModule to be defined
        setTimeout(test, 500);
    </script>
</body>

</html>
